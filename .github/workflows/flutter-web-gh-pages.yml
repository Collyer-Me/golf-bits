# Build Flutter Web on GitHub-hosted runners and publish to GitHub Pages.
# No local Flutter install required — push to main to update the preview URL.

name: Flutter Web → GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'golf_bits/**'
      - '.github/workflows/flutter-web-gh-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Node 20 on Actions is deprecated; official actions below use Node 24.
    # This also opts third-party actions (e.g. flutter-action) into Node 24 until they update.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Add web platform files (if missing)
        working-directory: golf_bits
        run: flutter create . --project-name golf_bits --org com.golfbits --platforms=web

      - name: Dependencies
        working-directory: golf_bits
        run: flutter pub get

      - name: Analyze
        working-directory: golf_bits
        run: flutter analyze --no-fatal-infos

      # Repository secrets: SUPABASE_URL, SUPABASE_ANON_KEY (Dashboard → Settings → API).
      # If unset, the app builds but auth shows “not configured” until you add secrets and redeploy.
      - name: Build web
        working-directory: golf_bits
        env:
          BASE_HREF: /${{ github.event.repository.name }}/
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          flutter build web --release --base-href "$BASE_HREF" \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY"

      - name: Upload Pages artifact
        # Pin full semver: @v5 is not always published as a moving tag for this action.
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: golf_bits/build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0
